<div class="card h-100 border-0 shadow-sm text-center p-4">
  
  <div class="text-primary mb-3">
    <i class="bi bi-briefcase-fill display-5"></i>
  </div>
  
  <h2 class="h5 fw-bold">{{ miTrabajo()?.title }}</h2>
  
  <p class="text-muted small mb-3">
    {{ miTrabajo()?.description }}
  </p>

  <div class="d-flex justify-content-center mt-auto">
    <button class="btn btn-outline-primary btn-sm px-3 fw-bold" [routerLink]="['/nuestros-servicios', miTrabajo()?.seo]" style="font-size: 0.7rem; width: auto;">
      VER MÁS
    </button>
  </div>

</div>
