<section class="error-page d-flex align-items-center justify-content-center">
  <div class="container text-center">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <h1 class="display-1 fw-bold error-code">404</h1>
        
        <h2 class="mb-3 fw-bold text-dark">¡Ups! Te has perdido en el espacio</h2>
        
        <p class="lead mb-5 text-muted">
          La página que buscas no existe o ha sido movida a otra dimensión. 
          No te preocupes, puedes volver a casa con un solo clic.
        </p>

        <button [routerLink]="['/home']" class="btn btn-primary btn-lg rounded-pill px-5 shadow-lg hover-bounce">
          <i class="bi bi-house-door-fill me-2"></i> Volver al Inicio
        </button>
      </div>
    </div>
  </div>
</section>
