<section class="container py-5">
    <h1 class="fw-bold mb-4">Nuestros Productos</h1>
    <hr class="mb-5">

    <!-- El row va FUERA del bucle -->
    <div class="row g-4"> 
        @for (producto of arrayProductos; track producto.id) {
            <!-- Cada tarjeta es una columna -->
            <div class="col-12 col-md-6 col-lg-4">
                <app-product-card [miProducto]="producto"></app-product-card>
            </div>
        }
    </div>
</section>
