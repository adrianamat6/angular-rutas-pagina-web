<section class="container py-5">
  <div class="text-center mb-5">
    <h1 class="fw-bold display-5 mb-3">Nuestros Servicios</h1>
    <p class="text-muted mx-auto" style="max-width: 600px;">
      Ofrecemos soluciones personalizadas para impulsar tu negocio al siguiente nivel con tecnología de vanguardia.
    </p>
    <div class="d-flex justify-content-center">
      <hr class="w-25 border-primary border-2 opacity-100 mt-2">
    </div>
  </div>

  <div class="row g-4">
    @for(trabajo of arrayTrabajos; track trabajo.id) {
      <div class="col-md-6 col-lg-4">
        <div class="card h-100 shadow-sm border-0 custom-card">
          <div class="card-body p-4">
            <div class="icon-box bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center mb-4">
              <i class="bi bi-briefcase-fill fs-3"></i> 
            </div>
            
            <h2 class="h5 fw-bold mb-3">{{trabajo.title}}</h2>
            
            <p class="card-text text-secondary mb-4">
              {{trabajo.description}}
            </p>
          </div>
          
          <div class="card-footer bg-transparent border-0 pt-0 pb-4 px-4">
            <a class="btn btn-link text-primary fw-semibold p-0 text-decoration-none">
              Saber más <i class="bi bi-arrow-right ms-1"></i>
            </a>
          </div>
        </div>
      </div>
    }
  </div>
</section>
