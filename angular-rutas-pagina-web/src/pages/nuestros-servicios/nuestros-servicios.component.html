<section class="container py-5">
  <div class="text-center mb-5">
    <h1 class="fw-bold display-5 mb-3">Nuestros Servicios</h1>
    <p class="text-muted mx-auto" style="max-width: 600px;">
      Ofrecemos soluciones personalizadas para impulsar tu negocio al siguiente nivel con tecnología de vanguardia.
    </p>
    <div class="d-flex justify-content-center">
      <hr class="w-25 border-primary border-2 opacity-100 mt-2">
    </div>
  </div>

  <div class="row g-4 d-flex">
    @for(trabajo of arrayTrabajos; track trabajo.id) {
        <app-work-card [miTrabajo]="trabajo"></app-work-card>
    }
  </div>
</section>
